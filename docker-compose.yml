version: "3.9"

services:
  # ── Main trading app ────────────────────────────────────────────────────────
  app:
    build: { context: ., dockerfile: Dockerfile }
    container_name: polymarket_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [polymarket_net]
    command: python main.py --mode paper

  # ── API backend (port 8088) ─────────────────────────────────────────────────
  api:
    build: { context: ., dockerfile: Dockerfile }
    container_name: polymarket_api
    restart: unless-stopped
    env_file: .env
    ports: ["8088:8088"]
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [polymarket_net]
    command: python -c "import uvicorn; from web.api import app; uvicorn.run(app,host='0.0.0.0',port=8088)"

  # ── Control dashboard (port 3056) ──────────────────────────────────────────
  dashboard:
    build: { context: ., dockerfile: Dockerfile }
    container_name: polymarket_dashboard
    restart: unless-stopped
    ports: ["3056:3056"]
    networks: [polymarket_net]
    command: python web/dashboard_server.py

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: polymarket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polymarket}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-trader} -d ${POSTGRES_DB:-polymarket}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [polymarket_net]

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: polymarket_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASSWORD}","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [polymarket_net]

  # ── Grafana (monitoring, --profile monitoring) ─────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: polymarket_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports: ["3060:3000"]
    depends_on: [prometheus]
    networks: [polymarket_net]
    profiles: [monitoring]

  prometheus:
    image: prom/prometheus:latest
    container_name: polymarket_prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports: ["9090:9090"]
    networks: [polymarket_net]
    profiles: [monitoring]

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:

networks:
  polymarket_net:
    driver: bridge
